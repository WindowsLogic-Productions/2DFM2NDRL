# FM2K Launcher — English source-of-truth string table.
#
# Every user-visible launcher string lives here. Keep keys descriptive but
# stable: rename only when the string's role in the UI changes — translation
# files have to be re-translated for any rename, so churning keys for cosmetic
# reasons hurts contributors.
#
# Format: key = value. UTF-8. # for comments. Whitespace around = is trimmed.
# %s / %d / %u format specifiers pass through to ImGui::Text and friends —
# translators must preserve them in the same order (or use %1$s positional
# specifiers if the language reorders).

