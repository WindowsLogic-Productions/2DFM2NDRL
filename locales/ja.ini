# FM2K ランチャー — 日本語訳。
#
# 機械翻訳された初版です。違和感のある表現や用語のばらつきは、ネイティブ
# 翻訳者がレビューしてから上書きしてください。
# %s / %d / %u などの書式指定子は en.ini と同じ順番で残してください。
# (英語と語順を変える必要があれば %1$s 形式で位置指定もできます。)

