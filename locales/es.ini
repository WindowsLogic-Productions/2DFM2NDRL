# FM2K Launcher — traducción al español.
#
# Versión inicial de traducción automática. Las expresiones poco naturales y
# la terminología inconsistente deben ser revisadas por un traductor nativo
# antes de sobrescribir.
# Los marcadores de formato %s / %d / %u deben mantenerse en el mismo orden
# que en en.ini. (Si necesitas cambiar el orden, usa la forma posicional
# %1$s.)

